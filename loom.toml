[project]
name = "paddle-pilot"

[agent]
inbox_plan_batch = 10
task_batch = 1
next_wait_seconds = 60.0
next_retries = 5
executor_command = ""
offline_after_minutes = 30
# Zellij-backed launching currently lives in `just start|resume ... zellij`.
# Runtime metadata is persisted under `.paddle-pilot/sessions/<branch>/runtime.json`
# so future executor_command / resume templates can reattach deterministically.
# TODO: wire explicit loom-side resume/reattach templates once the executor contract is finalized.

[threads]
default_priority = 50
